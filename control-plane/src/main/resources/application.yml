server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 250MB
      max-request-size: 250MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

jenerator:
  owner-api-key: change-me
  public-api-base-url: http://localhost:8080
  asset-storage-path: data/assets
  artifact-storage-path: data/artifacts
  worker-pairing-code: change-me
